name: Publish to crates.io

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify git tag matches version
        run: |
          VERSION=$(grep "^version" Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          GIT_TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "")
          if [ -z "$GIT_TAG" ]; then
            echo "Error: Current commit is not tagged"
            exit 1
          fi
          if [ "$GIT_TAG" != "v${VERSION}" ]; then
            echo "Error: Git tag '$GIT_TAG' does not match version 'v${VERSION}'"
            exit 1
          fi
          echo "✓ Git tag matches version: $GIT_TAG"

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
